<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Luganda 1000 — Learn Core Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1D9E75; --green-light: #e6f7f1; --green-dark: #0f6e52;
  --amber: #f59e0b; --amber-light: #fef3c7;
  --red: #ef4444; --red-light: #fee2e2;
  --blue: #3b82f6; --blue-light: #eff6ff;
  --bg: #faf9f6; --surface: #ffffff; --surface2: #f4f3ef;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --text: #1a1917; --text2: #6b6860; --text3: #a8a59e;
  --radius: 14px; --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-flag { width: 30px; height: 20px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
.flag-black { flex:1; background:#000; } .flag-yellow { flex:1; background:#FCDC04; } .flag-red { flex:1; background:#D90000; }
.logo-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.logo-name span { color: var(--green); }
.progress-wrap { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text2); }
.progress-bar { width:130px; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--green); border-radius:3px; transition:width 0.5s; }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 61px); }

/* SIDEBAR */
.sidebar { width: 230px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.2rem 0; flex-shrink: 0; overflow-y: auto; }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0.5rem 1.2rem 0.3rem; }
.cat-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 0.6rem 1.2rem; border: none; background: none; cursor: pointer; font-size: 13.5px; color: var(--text2); text-align: left; transition: background 0.15s; font-family: 'DM Sans', sans-serif; }
.cat-btn:hover { background: var(--surface2); }
.cat-btn.active { background: var(--green-light); color: var(--green-dark); font-weight: 600; }
.cat-icon { font-size: 15px; width: 20px; flex-shrink: 0; }
.cat-count { margin-left: auto; font-size: 11px; color: var(--text3); }
.cat-btn.active .cat-count { color: var(--green); }

/* CONTENT */
.content { flex: 1; padding: 2rem; overflow-y: auto; max-width: 1100px; }
.content-hdr { margin-bottom: 1.5rem; }
.content-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin-bottom: 4px; }
.content-desc { font-size: 14px; color: var(--text2); }

/* SEARCH */
.search-input { width: 100%; padding: 0.65rem 1rem; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); font-size: 14px; color: var(--text); outline: none; font-family: 'DM Sans', sans-serif; margin-bottom: 1.2rem; }
.search-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }

/* MODE BAR */
.mode-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.mode-btn { padding: 0.4rem 1rem; border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; background: none; cursor: pointer; color: var(--text2); transition: all 0.15s; font-family: 'DM Sans', sans-serif; display:flex; align-items:center; gap:5px; }
.mode-btn:hover { border-color: var(--green); color: var(--green); }
.mode-btn.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 500; }

/* WORD GRID */
.word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
.word-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s; cursor: default; }
.word-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
.word-card.learned { border-color: var(--green); }
.word-card.learned::after { content:''; position:absolute; top:10px; right:10px; width:8px; height:8px; border-radius:50%; background:var(--green); }
.pictogram { font-size: 38px; margin-bottom: 0.7rem; line-height: 1; }
.luganda-word { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.english-word { font-size: 12px; color: var(--text2); margin-bottom: 0.5rem; }
.pronunciation { font-size: 10.5px; color: var(--text3); margin-bottom: 0.7rem; font-style: italic; }
.card-actions { display:flex; gap:5px; }
.audio-btn, .learn-btn { padding: 4px 10px; border-radius: 20px; font-size: 11.5px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
.audio-btn { border: 1px solid var(--border2); background: none; color: var(--text2); }
.audio-btn:hover { background: var(--surface2); }
.learn-btn { border: 1px solid var(--green); background: none; color: var(--green); }
.learn-btn.done, .learn-btn:hover { background: var(--green); color: #fff; }

/* QUIZ MODE */
.quiz-wrap { max-width: 540px; margin: 0 auto; }
.quiz-progress-bar { background: var(--surface2); border-radius: 4px; height: 5px; margin-bottom: 1.5rem; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--green); transition: width 0.3s; }
.quiz-score-bar { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 0.75rem; }
.quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; }
.quiz-pictogram { font-size: 68px; margin-bottom: 0.8rem; }
.quiz-label { font-size: 13px; color: var(--text2); margin-bottom: 0.3rem; }
.quiz-word { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; margin-bottom: 0.3rem; }
.quiz-pron { font-size: 12px; color: var(--text3); font-style: italic; margin-bottom: 1rem; }
.quiz-audio-btn { padding: 6px 14px; border: 1px solid var(--border2); border-radius: 20px; background: none; font-size: 13px; cursor: pointer; color: var(--text2); font-family: 'DM Sans', sans-serif; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
.quiz-opt { padding: 0.8rem; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: none; font-size: 14px; cursor: pointer; color: var(--text); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.quiz-opt:hover:not(:disabled) { background: var(--surface2); border-color: var(--green); }
.quiz-opt.correct { background: #dcfce7; border-color: #16a34a; color: #15803d; }
.quiz-opt.wrong { background: var(--red-light); border-color: var(--red); color: #b91c1c; }
.quiz-next { margin-top: 1.2rem; padding: 0.65rem 1.8rem; background: var(--green); color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; display: none; font-family: 'DM Sans', sans-serif; font-weight: 500; }
.quiz-complete { text-align: center; padding: 3rem 2rem; background: var(--surface); border-radius: var(--radius); }
.quiz-complete .big-emoji { font-size: 64px; margin-bottom: 1rem; }
.quiz-complete h2 { font-family:'Fraunces',serif; font-size:28px; margin-bottom:0.5rem; }
.quiz-complete p { color: var(--text2); margin-bottom: 1.5rem; }
.btn-green { padding: 0.65rem 1.8rem; background: var(--green); color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }

/* MATCHING PAIRS */
.pairs-wrap { max-width: 680px; margin: 0 auto; }
.pairs-score { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; font-size:13px; color:var(--text2); }
.pairs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pairs-col { display: flex; flex-direction: column; gap: 8px; }
.pairs-col-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; text-align: center; }
.pair-card { padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-size: 14px; text-align: center; transition: all 0.2s; user-select: none; min-height: 56px; display:flex; align-items:center; justify-content:center; gap:6px; }
.pair-card:hover:not(.matched):not(.wrong-flash) { border-color: var(--green); background: var(--green-light); }
.pair-card.selected { border-color: var(--amber); background: var(--amber-light); }
.pair-card.matched { border-color: var(--green); background: var(--green-light); color: var(--green-dark); cursor: default; opacity: 0.7; }
.pair-card.wrong-flash { border-color: var(--red); background: var(--red-light); animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* FILL IN THE BLANK */
.fill-wrap { max-width: 560px; margin: 0 auto; }
.fill-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.2rem; }
.fill-sentence { font-size: 18px; line-height: 1.7; margin-bottom: 1.5rem; text-align: center; }
.fill-blank { display: inline-block; border-bottom: 2px solid var(--green); min-width: 100px; color: var(--green); font-weight: 600; font-family: 'Fraunces', serif; font-size: 20px; }
.fill-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fill-opt { padding: 0.8rem; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: none; font-size: 14px; cursor: pointer; color: var(--text); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.fill-opt:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
.fill-opt.correct { background: #dcfce7; border-color: #16a34a; color: #15803d; }
.fill-opt.wrong { background: var(--red-light); border-color: var(--red); color: #b91c1c; }
.fill-hint { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 1rem; font-style: italic; }

/* STORY MODE */
.story-wrap { max-width: 640px; margin: 0 auto; }
.story-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; cursor: pointer; transition: all 0.2s; }
.story-card:hover { border-color: var(--green); box-shadow: var(--shadow); transform: translateY(-2px); }
.story-card .s-emoji { font-size: 36px; margin-bottom: 0.5rem; }
.story-card .s-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.story-card .s-desc { font-size: 12px; color: var(--text2); }
.story-reader { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
.story-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.story-title { font-family:'Fraunces',serif; font-size:22px; font-weight:600; }
.back-btn { padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; background: none; font-size: 13px; cursor: pointer; color: var(--text2); font-family:'DM Sans',sans-serif; }
.story-text { font-size: 16px; line-height: 2; margin-bottom: 1.5rem; }
.story-word { background: var(--amber-light); border-bottom: 2px solid var(--amber); cursor: pointer; border-radius: 3px; padding: 1px 3px; transition: background 0.15s; position: relative; }
.story-word:hover { background: #fde68a; }
.story-word.revealed { background: var(--green-light); border-bottom-color: var(--green); }
.word-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; font-size: 12px; padding: 5px 10px; border-radius: 6px; white-space: nowrap; z-index: 100; pointer-events: none; }
.story-word:hover .word-tooltip, .story-word.revealed .word-tooltip { display: block; }
.story-legend { background: var(--surface2); border-radius: var(--radius-sm); padding: 1rem; font-size: 13px; color: var(--text2); }
.story-legend strong { color: var(--text); }
.story-glossary { margin-top: 1.2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.glossary-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 0.8rem; font-size: 13px; }
.glossary-item .g-lug { font-weight: 600; color: var(--green-dark); }
.glossary-item .g-eng { color: var(--text2); }

.empty { text-align:center; padding:3rem; color:var(--text3); font-size:15px; }

@media(max-width:650px){
  .sidebar{display:none;}
  .word-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  .pairs-grid{grid-template-columns:1fr;}
  .quiz-options,.fill-options{grid-template-columns:1fr;}
  .progress-bar{display:none;}
  .content{padding:1rem;}
}
</style>

// State
var currentCat='greetings', learnedWords=new Set(JSON.parse(localStorage.getItem('lg_learned')||'[]')), mode='browse', quizState={}, pairsState={}, fillState={}, storyState={cat:null};

function save(){try{localStorage.setItem('lg_learned',JSON.stringify([...learnedWords]));}catch(e){}updateProgress();}
function updateProgress(){var t=Object.values(VOCAB).flat().length,c=learnedWords.size;document.getElementById('progress-text').textContent=c+' / '+t+' learned';document.getElementById('progress-fill').style.width=Math.round(c/t*100)+'%';}
function speak(w){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w),v=window.speechSynthesis.getVoices(),s=v.find(function(x){return x.lang.startsWith('sw');})||v.find(function(x){return x.lang.includes('ZA')||x.lang.includes('KE');});if(s)u.voice=s;u.rate=0.8;u.pitch=1.1;window.speechSynthesis.speak(u);}

function buildSidebar(){
  var h='<div><div class="sidebar-label">Categories</div>';
  CATS.forEach(function(c){
    var ws=VOCAB[c.id]||[],lc=ws.filter(function(w){return learnedWords.has(c.id+':'+w.l);}).length;
    h+='<button class="cat-btn'+(currentCat===c.id?' active':'')+'" onclick="selectCat(\''+c.id+'\')"><span class="cat-icon">'+c.icon+'</span><span>'+c.label+'</span><span class="cat-count">'+lc+'/'+ws.length+'</span></button>';
  });
  document.getElementById('sidebar').innerHTML=h+'</div>';
}
function selectCat(id){currentCat=id;mode='browse';storyState.cat=null;buildSidebar();render();}

function render(){
  var cat=CATS.find(function(c){return c.id===currentCat;}),words=VOCAB[currentCat]||[];
  var sv='',es=document.getElementById('search-input');if(es)sv=es.value;
  var filtered=words;
  if(sv&&mode==='browse'){var q=sv.toLowerCase();filtered=words.filter(function(w){return w.l.toLowerCase().includes(q)||w.e.toLowerCase().includes(q);});}

  var h='<div class="content-hdr"><h1 class="content-title">'+cat.icon+' '+cat.label+'</h1><p class="content-desc">'+words.length+' words &nbsp;·&nbsp; tap a mode to learn</p></div>';
  if(mode==='browse')h+='<input class="search-input" id="search-input" type="text" placeholder="Search Luganda or English…" value="'+sv+'" oninput="onSearch(this.value)">';
  h+='<div class="mode-bar">'
    +'<button class="mode-btn'+(mode==='browse'?' active':'')+'" onclick="setMode(\'browse\')">📚 Browse</button>'
    +'<button class="mode-btn'+(mode==='quiz'?' active':'')+'" onclick="setMode(\'quiz\')">⚡ Quiz</button>'
    +'<button class="mode-btn'+(mode==='pairs'?' active':'')+'" onclick="setMode(\'pairs\')">🃏 Match Pairs</button>'
    +'<button class="mode-btn'+(mode==='fill'?' active':'')+'" onclick="setMode(\'fill\')">✏️ Fill Blank</button>'
    +'<button class="mode-btn'+(mode==='story'?' active':'')+'" onclick="setMode(\'story\')">📖 Story</button>'
    +'</div>';

  if(mode==='browse') h+=renderBrowse(filtered);
  else if(mode==='quiz') h+=renderQuiz(words);
  else if(mode==='pairs') h+=renderPairs(words);
  else if(mode==='fill') h+=renderFill(words);
  else if(mode==='story') h+=renderStory();

  document.getElementById('content').innerHTML=h;
}

function setMode(m){mode=m;if(m==='quiz')initQuiz();else if(m==='pairs')initPairs();else if(m==='fill')initFill();render();}
function onSearch(v){render();var si=document.getElementById('search-input');if(si){si.value=v;si.focus();}}

// BROWSE
function renderBrowse(words){
  if(!words.length)return'<div class="empty">No words found.</div>';
  var h='<div class="word-grid">';
  words.forEach(function(w){
    var key=currentCat+':'+w.l,isl=learnedWords.has(key),sw=w.l.replace(/'/g,"\\'"),sc=currentCat;
    h+='<div class="word-card'+(isl?' learned':'')+'"><div class="pictogram">'+w.ic+'</div><div class="luganda-word">'+w.l+'</div><div class="english-word">'+w.e+'</div><div class="pronunciation">'+w.p+'</div><div class="card-actions"><button class="audio-btn" onclick="speak(\''+sw+'\')">▶ Listen</button><button class="learn-btn'+(isl?' done':'')+'" onclick="toggleLearned(\''+sc+'\',\''+sw+'\',this)">'+(isl?'✓':'Learn')+'</button></div></div>';
  });
  return h+'</div>';
}
function toggleLearned(cat,word,btn){var k=cat+':'+word;if(learnedWords.has(k)){learnedWords.delete(k);btn.innerHTML='Learn';btn.classList.remove('done');btn.closest('.word-card').classList.remove('learned');}else{learnedWords.add(k);btn.innerHTML='✓';btn.classList.add('done');btn.closest('.word-card').classList.add('learned');}save();buildSidebar();}

// QUIZ
function initQuiz(){var ws=VOCAB[currentCat]||[];quizState={words:ws.slice().sort(function(){return Math.random()-0.5;}),idx:0,score:0,answered:false};}
function renderQuiz(words){
  if(!quizState.words||!quizState.words.length)initQuiz();
  if(quizState.idx>=quizState.words.length)return renderComplete('Quiz',quizState.score,quizState.words.length,'initQuiz();render()');
  var w=quizState.words[quizState.idx],d=words.filter(function(x){return x.e!==w.e;}).sort(function(){return Math.random()-0.5;}).slice(0,3),opts=d.concat([w]).sort(function(){return Math.random()-0.5;}),pp=Math.round(quizState.idx/quizState.words.length*100),sw=w.l.replace(/'/g,"\\'");
  var oh=opts.map(function(o){var se=o.e.replace(/'/g,"\\'");return'<button class="quiz-opt" onclick="answerQuiz(\''+se+'\')">'+o.e+'</button>';}).join('');
  return'<div class="quiz-wrap"><div class="quiz-score-bar"><span>Q '+(quizState.idx+1)+'/'+quizState.words.length+'</span><span>Score: '+quizState.score+'</span></div><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pp+'%"></div></div><div class="quiz-card"><div class="quiz-pictogram">'+w.ic+'</div><div class="quiz-label">What does this mean in English?</div><div class="quiz-word">'+w.l+'</div><div class="quiz-pron">'+w.p+'</div><button class="quiz-audio-btn" onclick="speak(\''+sw+'\')">▶ Hear it</button><div class="quiz-options">'+oh+'</div><button class="quiz-next" id="qnext" onclick="nextQuiz()">Next →</button></div></div>';
}
function answerQuiz(chosen){if(quizState.answered)return;quizState.answered=true;var w=quizState.words[quizState.idx],correct=w.e;document.querySelectorAll('.quiz-opt').forEach(function(b){b.disabled=true;if(b.textContent===correct)b.classList.add('correct');else if(b.textContent===chosen&&chosen!==correct)b.classList.add('wrong');});if(chosen===correct){quizState.score++;learnedWords.add(currentCat+':'+w.l);save();buildSidebar();}document.getElementById('qnext').style.display='inline-block';}
function nextQuiz(){quizState.idx++;quizState.answered=false;render();}

// MATCHING PAIRS
function initPairs(){
  var words=VOCAB[currentCat]||[];
  var sample=words.slice().sort(function(){return Math.random()-0.5;}).slice(0,8);
  var lugCards=sample.map(function(w,i){return{id:'l'+i,text:w.ic+' '+w.l,match:'e'+i,type:'lug',matched:false};});
  var engCards=sample.map(function(w,i){return{id:'e'+i,text:w.e,match:'l'+i,type:'eng',matched:false};});
  var shuffledEng=engCards.slice().sort(function(){return Math.random()-0.5;});
  pairsState={lug:lugCards,eng:shuffledEng,selected:null,score:0,total:sample.length,wrongFlash:null};
}
function renderPairs(words){
  if(!pairsState.lug)initPairs();
  var ps=pairsState,matched=ps.lug.filter(function(c){return c.matched;}).length;
  if(matched===ps.total)return renderComplete('Match Pairs',ps.score,ps.total,'initPairs();render()');
  var lh=ps.lug.map(function(c){return'<div class="pair-card'+(c.matched?' matched':'')+(ps.selected&&ps.selected.id===c.id?' selected':'')+(ps.wrongFlash===c.id?' wrong-flash':'')+'" onclick="selectPair(\''+c.id+'\')">'+c.text+'</div>';}).join('');
  var eh=ps.eng.map(function(c){return'<div class="pair-card'+(c.matched?' matched':'')+(ps.selected&&ps.selected.id===c.id?' selected':'')+(ps.wrongFlash===c.id?' wrong-flash':'')+'" onclick="selectPair(\''+c.id+'\')">'+c.text+'</div>';}).join('');
  return'<div class="pairs-wrap"><div class="pairs-score"><span>Matched: '+matched+' / '+ps.total+'</span><span>Score: '+ps.score+'</span></div><div class="pairs-grid"><div><div class="pairs-col-label">Luganda</div>'+lh+'</div><div><div class="pairs-col-label">English</div>'+eh+'</div></div></div>';
}
function selectPair(id){
  var ps=pairsState,all=ps.lug.concat(ps.eng),card=all.find(function(c){return c.id===id;});
  if(!card||card.matched)return;
  if(!ps.selected){ps.selected=card;render();return;}
  if(ps.selected.id===id){ps.selected=null;render();return;}
  var a=ps.selected,b=card;
  if(a.match===b.id){
    a.matched=true;b.matched=true;ps.score++;ps.selected=null;
    learnedWords.add(currentCat+':'+a.text.replace(/^[^\s]+ /,''));save();buildSidebar();
    render();
  } else {
    ps.wrongFlash=a.id;var wfb=b.id;ps.selected=null;render();
    setTimeout(function(){pairsState.wrongFlash=null;render();},400);
  }
}

// FILL IN THE BLANK
function initFill(){
  var sentences=FILL_SENTENCES[currentCat]||[];
  var shuffled=sentences.slice().sort(function(){return Math.random()-0.5;});
  fillState={sentences:shuffled,idx:0,score:0,answered:false};
}
function renderFill(words){
  if(!fillState.sentences||!fillState.sentences.length)initFill();
  var fs=fillState;
  if(fs.idx>=fs.sentences.length)return renderComplete('Fill in the Blank',fs.score,fs.sentences.length,'initFill();render()');
  var s=fs.sentences[fs.idx],allWords=VOCAB[currentCat]||[];
  var distractors=allWords.filter(function(w){return w.l!==s.target;}).sort(function(){return Math.random()-0.5;}).slice(0,3).map(function(w){return w.l;});
  var opts=distractors.concat([s.target]).sort(function(){return Math.random()-0.5;});
  var pp=Math.round(fs.idx/fs.sentences.length*100);
  var oh=opts.map(function(o){var so=o.replace(/'/g,"\\'");return'<button class="fill-opt" onclick="answerFill(\''+so+'\')">'+o+'</button>';}).join('');
  return'<div class="fill-wrap"><div class="quiz-score-bar"><span>Q '+(fs.idx+1)+'/'+fs.sentences.length+'</span><span>Score: '+fs.score+'</span></div><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+pp+'%"></div></div><div class="fill-card"><div class="fill-sentence">'+s.before+' <span class="fill-blank" id="fill-blank">___</span> '+s.after+'</div><div class="fill-hint">Hint: '+s.hint+'</div><div class="fill-options">'+oh+'</div><button class="quiz-next" id="fnext" onclick="nextFill()">Next →</button></div></div>';
}
function answerFill(chosen){if(fillState.answered)return;fillState.answered=true;var s=fillState.sentences[fillState.idx];var blank=document.getElementById('fill-blank');if(blank)blank.textContent=chosen;document.querySelectorAll('.fill-opt').forEach(function(b){b.disabled=true;if(b.textContent===s.target)b.classList.add('correct');else if(b.textContent===chosen&&chosen!==s.target)b.classList.add('wrong');});if(chosen===s.target){fillState.score++;learnedWords.add(currentCat+':'+s.target);save();buildSidebar();}document.getElementById('fnext').style.display='inline-block';}
function nextFill(){fillState.idx++;fillState.answered=false;render();}

// STORY MODE
function renderStory(){
  if(!storyState.cat){
    // Show story picker — all categories
    var h='<div class="story-picker">';
    CATS.forEach(function(c){
      var s=STORIES[c.id];
      if(!s)return;
      h+='<div class="story-card" onclick="openStory(\''+c.id+'\')"><div class="s-emoji">'+s.emoji+'</div><div class="s-title">'+s.title+'</div><div class="s-desc">'+c.label+'</div></div>';
    });
    return h+'</div>';
  }
  var s=STORIES[storyState.cat];
  if(!s)return'<div class="empty">No story yet for this category.</div>';
  // Parse story text: replace <w l="..." e="...">word</w> with interactive spans
  var storyHtml=s.text.replace(/<w l="([^"]+)" e="([^"]+)">([^<]+)<\/w>/g,function(match,l,e,display){
    var sl=l.replace(/'/g,"\\'"),se=e.replace(/'/g,"\\'");
    return'<span class="story-word" onclick="revealWord(this,\''+sl+'\',\''+se+'\')">'+display+'<span class="word-tooltip">'+e+'</span></span>';
  });
  // Extract glossary
  var glossary=[];var re=/<w l="([^"]+)" e="([^"]+)">/g,m;while((m=re.exec(s.text))!==null){var exists=glossary.find(function(g){return g.l===m[1];});if(!exists)glossary.push({l:m[1],e:m[2]});}
  var gh=glossary.map(function(g){return'<div class="glossary-item"><div class="g-lug">'+g.l+'</div><div class="g-eng">'+g.e+'</div></div>';}).join('');
  return'<div class="story-wrap"><div class="story-reader"><div class="story-header"><div class="story-title">'+s.emoji+' '+s.title+'</div><button class="back-btn" onclick="storyState.cat=null;render()">← All stories</button></div><div class="story-text">'+storyHtml+'</div><div class="story-legend">💡 <strong>Tap the highlighted words</strong> to reveal their English meaning. Words you explore count as learned!</div><div class="story-glossary">'+gh+'</div></div></div>';
}
function openStory(catId){storyState.cat=catId;render();}
function revealWord(el,l,e){el.classList.toggle('revealed');learnedWords.add(currentCat+':'+l);save();buildSidebar();}

// COMPLETE SCREEN
function renderComplete(game,score,total,restart){
  var pct=Math.round(score/total*100);
  var emoji=pct>=80?'🏆':pct>=50?'🌟':'💪';
  return'<div class="quiz-wrap"><div class="quiz-complete"><div class="big-emoji">'+emoji+'</div><h2>'+game+' complete!</h2><p>You scored <strong>'+score+' / '+total+'</strong> ('+pct+'%)</p><button class="btn-green" onclick="'+restart+'">Play again</button></div></div>';
}

if(window.speechSynthesis)window.speechSynthesis.getVoices();
buildSidebar();updateProgress();render();
</script>

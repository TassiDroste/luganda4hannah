  * { box-sizing: border-box; margin: 0; padding: 0; }

  .flag-red { flex: 1; background: #D90000; }
  .logo-text { font-size: 20px; font-weight: 500; }
  .logo-sub { font-size: 12px; color: #666; margin-top: 1px; }

  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.4s; }

  .main { display: flex; min-height: calc(100vh - 65px); }

  .sidebar { width: 220px; background: #fff; border-right: 0.5px solid rgba(0,0,0,0.12); padding: 1rem 0; flex-shrink: 0; overflow-y: auto; }

  .cat-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 0.55rem 1rem; border: none; background: none; cursor: pointer; font-size: 14px; color: #555; text-align: left; transition: background 0.15s; }
  .cat-btn:hover { background: #f5f5f5; }
  .cat-btn.active { background: #e6f1fb; color: #185FA5; font-weight: 500; }
  .cat-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
  .cat-count { margin-left: auto; font-size: 11px; color: #aaa; }
  .cat-btn.active .cat-count { color: #185FA5; opacity: 0.7; }

  .content { flex: 1; padding: 1.5rem; overflow-y: auto; }
  .content-header { margin-bottom: 1.5rem; }
  .content-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .content-desc { font-size: 14px; color: #666; }

  .search-wrap { margin-bottom: 1.5rem; }
  .search-input { width: 100%; padding: 0.6rem 1rem; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; background: #fff; font-size: 14px; color: #1a1a1a; outline: none; }

  .mode-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .mode-btn { padding: 0.4rem 1rem; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 20px; font-size: 13px; background: none; cursor: pointer; color: #555; transition: all 0.15s; }
  .mode-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }

  .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

  .word-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .word-card:hover { border-color: rgba(0,0,0,0.25); transform: translateY(-2px); }
  .word-card.learned { border-color: #1D9E75; }
  .word-card.learned::after { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; }

  .pictogram { font-size: 40px; margin-bottom: 0.75rem; line-height: 1; }
  .luganda-word { font-size: 17px; font-weight: 500; margin-bottom: 2px; color: #1a1a1a; }
  .english-word { font-size: 13px; color: #666; margin-bottom: 0.75rem; }
  .pronunciation { font-size: 11px; color: #aaa; margin-bottom: 0.75rem; font-style: italic; }
  .card-actions { display: flex; gap: 6px; }
  .audio-btn { padding: 5px 10px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 20px; background: none; font-size: 12px; cursor: pointer; color: #555; transition: background 0.15s; display: flex; align-items: center; gap: 4px; }
  .audio-btn:hover { background: #f5f5f5; }
  .learn-btn { padding: 5px 10px; border: 0.5px solid #1D9E75; border-radius: 20px; background: none; font-size: 12px; cursor: pointer; color: #1D9E75; transition: background 0.15s; }
  .learn-btn:hover, .learn-btn.done { background: #1D9E75; color: #fff; }

  .quiz-wrap { max-width: 520px; margin: 0 auto; }
  .quiz-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
  .quiz-pictogram { font-size: 72px; margin-bottom: 1rem; }
  .quiz-question { font-size: 14px; color: #666; margin-bottom: 0.5rem; }
  .quiz-word { font-size: 28px; font-weight: 500; margin-bottom: 0.5rem; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
  .quiz-opt { padding: 0.75rem; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: none; font-size: 15px; cursor: pointer; color: #1a1a1a; transition: background 0.15s; }
  .quiz-opt:hover { background: #f5f5f5; }
  .quiz-opt.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .quiz-opt.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .quiz-next { margin-top: 1rem; padding: 0.6rem 1.5rem; background: #1D9E75; color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; display: none; }
  .quiz-score { text-align: center; font-size: 14px; color: #666; margin-bottom: 1rem; }
  .quiz-audio-btn { margin-top: 1rem; padding: 6px 14px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 20px; background: none; font-size: 13px; cursor: pointer; color: #555; }

  .empty { text-align: center; padding: 3rem; color: #aaa; }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .word-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .progress-bar { display: none; }
  }
</style>

let currentCat = 'greetings';
let learnedWords = new Set(JSON.parse(localStorage.getItem('luganda_learned') || '[]'));
let mode = 'browse';
let quizState = {};

function saveProgress() {
  try { localStorage.setItem('luganda_learned', JSON.stringify([...learnedWords])); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  const total = Object.values(VOCAB).flat().length;
  const count = learnedWords.size;
  document.getElementById('progress-text').textContent = count + ' / ' + total + ' learned';
  document.getElementById('progress-fill').style.width = Math.round(count/total*100) + '%';
}

function speakLuganda(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  const voices = window.speechSynthesis.getVoices();
  const swahili = voices.find(function(v){ return v.lang.startsWith('sw'); });
  const african = voices.find(function(v){ return v.lang.includes('ZA') || v.lang.includes('KE') || v.lang.includes('NG'); });
  if (swahili) utt.voice = swahili;
  else if (african) utt.voice = african;
  utt.rate = 0.8;
  utt.pitch = 1.1;
  window.speechSynthesis.speak(utt);
}

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var html = '<div><div class="sidebar-label">Categories</div>';
  CATEGORIES.forEach(function(cat) {
    var words = VOCAB[cat.id] || [];
    var learnedInCat = words.filter(function(w){ return learnedWords.has(cat.id + ':' + w.l); }).length;
    html += '<button class="cat-btn' + (currentCat===cat.id?' active':'') + '" onclick="selectCat(\'' + cat.id + '\')">'
      + '<span class="cat-icon">' + cat.icon + '</span>'
      + '<span>' + cat.label + '</span>'
      + '<span class="cat-count">' + learnedInCat + '/' + words.length + '</span>'
      + '</button>';
  });
  html += '</div>';
  sb.innerHTML = html;
}

function selectCat(id) {
  currentCat = id;
  buildSidebar();
  renderContent();
}

function renderContent() {
  var content = document.getElementById('content');
  var cat = CATEGORIES.find(function(c){ return c.id === currentCat; });
  var words = VOCAB[currentCat] || [];
  var searchVal = '';
  var existingSearch = document.getElementById('search-input');
  if (existingSearch) searchVal = existingSearch.value;
  var filtered = words;
  if (searchVal) {
    var q = searchVal.toLowerCase();
    filtered = words.filter(function(w){ return w.l.toLowerCase().includes(q) || w.e.toLowerCase().includes(q); });
  }

  var html = '<div class="content-header">'
    + '<h1 class="content-title">' + cat.icon + ' ' + cat.label + '</h1>'
    + '<p class="content-desc">' + words.length + ' words in this category</p>'
    + '</div>'
    + '<div class="search-wrap"><input class="search-input" id="search-input" type="text" placeholder="Search in Luganda or English..." value="' + searchVal + '" oninput="onSearch(this.value)" /></div>'
    + '<div class="mode-bar">'
    + '<button class="mode-btn' + (mode==='browse'?' active':'') + '" onclick="setMode(\'browse\')">Browse</button>'
    + '<button class="mode-btn' + (mode==='quiz'?' active':'') + '" onclick="setMode(\'quiz\')">Quiz me</button>'
    + '</div>';

  if (mode === 'browse') {
    if (filtered.length === 0) {
      html += '<div class="empty">No words found.</div>';
    } else {
      html += '<div class="word-grid">';
      filtered.forEach(function(w) {
        var key = currentCat + ':' + w.l;
        var isLearned = learnedWords.has(key);
        var safeWord = w.l.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        var safeCat = currentCat.replace(/'/g,"\\'");
        html += '<div class="word-card' + (isLearned?' learned':'') + '">'
          + '<div class="pictogram">' + w.ic + '</div>'
          + '<div class="luganda-word">' + w.l + '</div>'
          + '<div class="english-word">' + w.e + '</div>'
          + '<div class="pronunciation">' + w.p + '</div>'
          + '<div class="card-actions">'
          + '<button class="audio-btn" onclick="speakLuganda(\'' + safeWord + '\')">&#9654; Listen</button>'
          + '<button class="learn-btn' + (isLearned?' done':'') + '" onclick="toggleLearned(\'' + safeCat + '\',\'' + safeWord + '\',this)">' + (isLearned?'&#10003;':'Learn') + '</button>'
          + '</div></div>';
      });
      html += '</div>';
    }
  } else {
    html += renderQuiz(words);
  }

  content.innerHTML = html;
}

function toggleLearned(cat, word, btn) {
  var key = cat + ':' + word;
  if (learnedWords.has(key)) {
    learnedWords.delete(key);
    btn.innerHTML = 'Learn';
    btn.classList.remove('done');
    btn.closest('.word-card').classList.remove('learned');
  } else {
    learnedWords.add(key);
    btn.innerHTML = '&#10003;';
    btn.classList.add('done');
    btn.closest('.word-card').classList.add('learned');
  }
  saveProgress();
  buildSidebar();
}

function onSearch(val) {
  renderContent();
  var si = document.getElementById('search-input');
  if (si) { si.value = val; si.focus(); }
}

function setMode(m) {
  mode = m;
  if (m === 'quiz') initQuiz();
  renderContent();
}

function initQuiz() {
  var words = VOCAB[currentCat] || [];
  var shuffled = words.slice().sort(function(){ return Math.random()-0.5; });
  quizState = { words: shuffled, index: 0, score: 0, answered: false };
}

function renderQuiz(words) {
  if (!quizState.words || quizState.words.length === 0) initQuiz();
  if (quizState.index >= quizState.words.length) {
    return '<div class="quiz-wrap"><div class="quiz-card">'
      + '<div class="quiz-pictogram">🎉</div>'
      + '<div class="quiz-word">Quiz complete!</div>'
      + '<div class="quiz-question">You scored ' + quizState.score + ' / ' + quizState.words.length + '</div>'
      + '<button class="quiz-next" style="display:inline-block;margin-top:1rem;" onclick="initQuiz();renderContent()">Play again</button>'
      + '</div></div>';
  }
  var w = quizState.words[quizState.index];
  var distractors = words.filter(function(x){ return x.e !== w.e; }).sort(function(){ return Math.random()-0.5; }).slice(0,3);
  var options = distractors.concat([w]).sort(function(){ return Math.random()-0.5; });
  var progPct = Math.round((quizState.index / quizState.words.length) * 100);
  var safeWord = w.l.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  var optHtml = options.map(function(opt){
    var safeE = opt.e.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<button class="quiz-opt" onclick="answerQuiz(\'' + safeE + '\')">' + opt.e + '</button>';
  }).join('');

  return '<div class="quiz-wrap">'
    + '<div class="quiz-score">Question ' + (quizState.index+1) + ' / ' + quizState.words.length + ' &nbsp;·&nbsp; Score: ' + quizState.score + '</div>'
    + '<div style="background:#eee;border-radius:4px;height:4px;margin-bottom:1.5rem;overflow:hidden;"><div style="width:' + progPct + '%;height:100%;background:#1D9E75;transition:width 0.3s;"></div></div>'
    + '<div class="quiz-card" id="quiz-card">'
    + '<div class="quiz-pictogram">' + w.ic + '</div>'
    + '<div class="quiz-question">What does this Luganda word mean?</div>'
    + '<div class="quiz-word">' + w.l + '</div>'
    + '<div class="quiz-question" style="font-style:italic;">' + w.p + '</div>'
    + '<button class="quiz-audio-btn" onclick="speakLuganda(\'' + safeWord + '\')">&#9654; Hear it</button>'
    + '<div class="quiz-options" id="quiz-options">' + optHtml + '</div>'
    + '<button class="quiz-next" id="quiz-next" onclick="nextQuiz()">Next word &#8594;</button>'
    + '</div></div>';
}

function answerQuiz(chosen) {
  if (quizState.answered) return;
  quizState.answered = true;
  var w = quizState.words[quizState.index];
  var correct = w.e;
  var opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(btn) {
    btn.disabled = true;
    if (btn.textContent === correct) btn.classList.add('correct');
    else if (btn.textContent === chosen && chosen !== correct) btn.classList.add('wrong');
  });
  if (chosen === correct) {
    quizState.score++;
    var key = currentCat + ':' + w.l;
    learnedWords.add(key);
    saveProgress();
    buildSidebar();
  }
  document.getElementById('quiz-next').style.display = 'inline-block';
}

function nextQuiz() {
  quizState.index++;
  quizState.answered = false;
  renderContent();
}

if (window.speechSynthesis) window.speechSynthesis.getVoices();
buildSidebar();
updateProgress();
renderContent();
</script>
</body>
</html>
